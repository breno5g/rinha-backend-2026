worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    upstream api {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
        keepalive 64;
    }

    server {
        listen 9999 default_server;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
