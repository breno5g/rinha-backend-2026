services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: api1
      PORT: "8080"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: api2
      PORT: "8080"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  load-balancer:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

networks:
  rinha:
    driver: bridge
