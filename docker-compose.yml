services:
  api1:
    image: breno5g/rinha-fraud-api:latest
    environment:
      INSTANCE_ID: api1
      SOCKET_PATH: /run/sock/api1.sock
      GOMEMLIMIT: 140MiB
      GOGC: "200"
      GC_MODE: "off"
      IVF_NPROBE: "${IVF_NPROBE:-}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-}"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: breno5g/rinha-fraud-api:latest
    environment:
      INSTANCE_ID: api2
      SOCKET_PATH: /run/sock/api2.sock
      GOMEMLIMIT: 140MiB
      GOGC: "200"
      GC_MODE: "off"
      IVF_NPROBE: "${IVF_NPROBE:-}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-}"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    depends_on:
      - api1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  load-balancer:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30MB"

  warmup:
    image: curlimages/curl:8.8.0
    entrypoint: ["/bin/sh", "/warmup.sh"]
    environment:
      BASE_URL: http://load-balancer:9999
      READY_RETRIES: "240"
      READY_SLEEP: "0.25"
      WARMUP_ROUNDS: "48"
    volumes:
      - ./warmup.sh:/warmup.sh:ro
    depends_on:
      - load-balancer
    networks:
      - rinha

networks:
  rinha:
    driver: bridge

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
