services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-fraud-api
    environment:
      INSTANCE_ID: api1
      SOCKET_PATH: /run/sock/api1.sock
      GOMEMLIMIT: 140MiB
      GOGC: "200"
      IVF_NPROBE: "${IVF_NPROBE:-}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-}"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: rinha-fraud-api
    environment:
      INSTANCE_ID: api2
      SOCKET_PATH: /run/sock/api2.sock
      GOMEMLIMIT: 140MiB
      GOGC: "200"
      IVF_NPROBE: "${IVF_NPROBE:-}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-}"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    depends_on:
      - api1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  load-balancer:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30MB"

networks:
  rinha:
    driver: bridge

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
